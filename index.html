<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Expérience interactive avec animation de rideaux">
    <meta name="theme-color" content="#1a0000">
    <title>Expérience Interactive - Rideau</title>
    <link rel="stylesheet" href="public/css/style.css">
</head>
<body>

    <main id="scene-container">
        <div id="scene"></div>

            <img src="assets/sol.png" class="background bg" alt="Background">

            <div class="background-reveal"></div>

            <img src="assets/rideau1.png" class="curtain left-curtain">
            <img src="assets/rideau2.png" class="curtain right-curtain">

            <div id="elements-container">
                <img src="assets/fauteuil.svg" class="element item-1" alt="Fauteuil">
                <img src="assets/fauteuils.svg" class="element item-2" alt="Fauteuils">
                <img src="assets/venus.png" class="element item-3" alt="Vénus de Milo">
                <img src="assets/lampe.svg" class="element item-4" alt="Lampe">
            </div>

        </div>
    </main>

    <script src="public/js/script.js"></script>
</body>
</html>
