<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Expérience interactive avec animation de rideaux">
    <meta name="theme-color" content="#1a0000">
    <title>Expérience Interactive - Rideau</title>
    <link rel="stylesheet" href="public/css/index.css">
</head>
<body>

    <div class="Home">
        <h1><strong><u>DAVID LYNCH</strong> :</u> <br><em>Commencez l'expérience</em></h1>
    </div>
    <main id="scene-container">
        <div id="scene"></div>

            <img src="assets/index/sol.png" class="background bg" alt="Background">

            <div class="background-reveal"></div>

            <img src="assets/index/rideau1.png" class="curtain left-curtain">
            <img src="assets/index/rideau2.png" class="curtain right-curtain">

            <div id="elements-container">
                <img src="assets/index/fauteuil.png" class="element item-1" data-target="./parcours.html" alt="Fauteuil" title="Son Parcours">
                <img src="assets/index/fauteuils.png" class="element item-2" data-target="./oeuvres.html" alt="Fauteuils" title="Ses Oeuvres">
                <img src="assets/index/venus.png" class="element item-3" data-target="./heritage.html" alt="Vénus de Milo" title="Son Héritage">
                <img src="assets/index/lampe1.png" class="element item-4"  alt="Lampe1">
                <img src="assets/index/lampe2.png" class="element item-5" data-target="./sources.html" alt="Lampe2" title="Nos sources">
            </div>

        </div>
    </main>

    <script src="public/js/index.js"></script>
</body>
</html>
