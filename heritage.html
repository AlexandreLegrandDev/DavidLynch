<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Expérience interactive avec animation de rideaux">
    <meta name="theme-color" content="#1a0000">
    <title>Expérience Interactive - Rideau</title>
    <link rel="stylesheet" href="public/css/heritage.css">
    <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="public/js/heritage.js" defer></script>

</head>
<body>
    
    <div class="page-flash"></div>

    <div id="titre">
        <h1>Son héritage</h1>
    </div>
    <div class="Home">
        <a href="./index.html"><svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="currentColor" class="icon icon-tabler icons-tabler-filled icon-tabler-home"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M12.707 2.293l9 9c.63 .63 .184 1.707 -.707 1.707h-1v6a3 3 0 0 1 -3 3h-1v-7a3 3 0 0 0 -2.824 -2.995l-.176 -.005h-2a3 3 0 0 0 -3 3v7h-1a3 3 0 0 1 -3 -3v-6h-1c-.89 0 -1.337 -1.077 -.707 -1.707l9 -9a1 1 0 0 1 1.414 0m.293 11.707a1 1 0 0 1 1 1v7h-4v-7a1 1 0 0 1 .883 -.993l.117 -.007z" /></svg></a>
    </div>
    
    <div class="eraserhead-scene">

        <img src="assets/heritage/eraserhead.webp" class="scene-img">

        <div class="image-wrapper">

            <div class="window w1">
                <img src="assets/heritage/silencio.jpg">
                <div class="tooltip">Le Silencio</div>
            </div>

            <div class="window w2">
                <img src="assets/heritage/maison_des_feuilles.jpg">
                <div class="tooltip">La Maison des Feuilles</div>
            </div>

            <div class="window w3">
                <img src="assets/heritage/gregory_crewdson.webp">
                <div class="tooltip">Gregory Crewdson</div>
            </div>

            <div class="window w4">
                <img src="assets/heritage/the_lighthouse.jpg">
                <div class="tooltip">The Lighthouse</div>
            </div>

            <div class="window w5">
                <img src="assets/heritage/Severance.jpg">
                <div class="tooltip">Severance</div>
            </div>

            <div class="window w6">
                <img src="assets/heritage/silent_hill.webp">
                <div class="tooltip">Silent Hill</div>
            </div>

        </div>

    </div>

    <div class="modal" id="modal">
        <div class="modal-overlay"></div>

        <div class="modal-content">
            <span class="close">&times;</span>
            <img id="modal-img" src="">
            <div class="modal-container">
                <div class="modal-titre" id="modal-titre"></div>
                <div class="modal-text" id="modal-text"></div>
            </div>
        </div>
    </div>

</body>
</html>
